# ============================================================
# RepoForge — CI Pipeline
# ============================================================
# Runs tests on every push and PR to main.
# Jobs: core lib tests, server tests, frontend typecheck+build.

name: CI

on:
  push:
    branches: [main]
    paths:
      - 'repoforge/**'
      - 'apps/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements*.txt'
  pull_request:
    branches: [main]
    paths:
      - 'repoforge/**'
      - 'apps/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'requirements*.txt'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Core Library Tests ────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run tests
        run: pytest tests/ -q --tb=short

  # ── Lint ──────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check repoforge/ --select E,F,W --ignore E501

  # ── Server Tests ──────────────────────────────────────────
  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(join(github.event.pull_request.labels.*.name, ','), 'server')

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: repoforge
          POSTGRES_PASSWORD: repoforge
          POSTGRES_DB: repoforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U repoforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install core library
        run: pip install -e .

      - name: Install server dependencies
        run: pip install -r apps/server/requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio httpx

      - name: Run server tests
        run: pytest apps/server/tests/ -v --tb=short
        env:
          DATABASE_URL: "postgresql+asyncpg://repoforge:repoforge@localhost:5432/repoforge_test"
          JWT_SECRET: "test-jwt-secret-ci-only"
          GITHUB_CLIENT_ID: "test-client-id"
          GITHUB_CLIENT_SECRET: "test-client-secret"
          STATE_SECRET: "test-state-secret"
          ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
          DEBUG: "true"

  # ── Frontend Typecheck & Build ────────────────────────────
  check-frontend:
    name: Frontend Check
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      contains(join(github.event.pull_request.labels.*.name, ','), 'frontend')

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web
